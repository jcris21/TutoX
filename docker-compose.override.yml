services:
  ms_ai_dev:
    build:
      context: .
      dockerfile: ms_ai/Dockerfile
      target: development
    volumes:
      - .:/app
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONPATH=/app
      - WATCHFILES_FORCE_POLLING=true
    command: >
      uvicorn ms_ai.app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
      --proxy-headers
      --forwarded-allow-ips="*"
    ports:
      - "8002:8000"
