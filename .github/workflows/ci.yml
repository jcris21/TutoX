name: CI

on:
  pull_request:
    branches: [ dev ]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: "fake-key-for-testing"
      API_KEY: "x-api-key"
      CHROMA_HOST: "localhost"
      CHROMA_PORT: "8500"
      CHROMA_TENANT: "default_tenant"
      CHROMA_DATABASE: "default_database"
      REDIS_URL: "redis://localhost:6379"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Clear disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.rbenv
          sudo apt-get clean
          df -h

      - name: Install deps
        run: |
          pip install --no-cache-dir -r ms_ai/requirements.txt
          pip install --no-cache-dir -r ms_ai/requirements-dev.txt
          pip install pytest-cov

      - name: Lint & test
        run: |
          black --check .
          isort --check-only --profile black .
          ruff check .
          pytest test/ --cov=ms_ai/app -v
